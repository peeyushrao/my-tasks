<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F2F0EB;
    --border: rgba(0,0,0,0.09);
    --border-hover: rgba(0,0,0,0.18);
    --text: #1A1814;
    --text-muted: #8A8479;
    --text-faint: #B8B4AC;
    --accent: #2D5A3D;
    --accent-light: #EAF2EC;
    --accent-text: #1D3D28;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --note-bg: #FAFAF7;
    --p-high: #C0392B;
    --p-high-bg: #FDECEA;
    --p-med: #D4750A;
    --p-med-bg: #FEF3E2;
    --p-low: #2D5A3D;
    --p-low-bg: #EAF2EC;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141210; --surface: #1E1C18; --surface2: #252320;
      --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.16);
      --text: #EDE9E0; --text-muted: #7A7670; --text-faint: #4A4740;
      --accent: #4A8C60; --accent-light: #1A2E20; --accent-text: #7DC495;
      --danger: #E05A4A; --danger-light: #2A1510; --note-bg: #19170F;
      --p-high: #E05A4A; --p-high-bg: #2A1510;
      --p-med: #E09A3A; --p-med-bg: #2A1F0A;
      --p-low: #4A8C60; --p-low-bg: #1A2E20;
      --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center;
    padding: 3rem 1rem 6rem;
  }

  .page { width: 100%; max-width: 600px; animation: fadeUp 0.5s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header { margin-bottom: 2rem; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; }

  .title-block h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 2.8rem; font-weight: 400; line-height: 1.1; letter-spacing: -0.5px;
  }
  .title-block h1 em { font-style: italic; color: var(--accent); }
  .date-line { font-size: 13px; font-weight: 300; color: var(--text-muted); margin-top: 6px; }

  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; margin-top: 6px; }

  .stats-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent-light); color: var(--accent-text);
    font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 999px; white-space: nowrap;
  }
  .stats-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .sync-status { font-size: 11px; color: var(--text-faint); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); transition: background 0.3s; }
  .sync-dot.syncing { background: #F0A500; animation: pulse 1s infinite; }
  .sync-dot.synced  { background: var(--accent); }
  .sync-dot.error   { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  .progress-wrap { margin-top: 1.25rem; display: flex; align-items: center; gap: 10px; }
  .progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .progress-label { font-size: 12px; color: var(--text-faint); min-width: 40px; text-align: right; }

  /* Search bar */
  .search-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 11px 16px; display: flex; align-items: center;
    gap: 10px; margin-bottom: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar:focus-within { border-color: var(--border-hover); box-shadow: var(--shadow-lg); }
  .search-icon { width: 16px; height: 16px; color: var(--text-faint); flex-shrink: 0; }
  #search-input {
    flex: 1; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    font-weight: 300; color: var(--text); outline: none;
  }
  #search-input::placeholder { color: var(--text-faint); }
  .search-clear {
    background: none; border: none; cursor: pointer;
    color: var(--text-faint); font-size: 18px; line-height: 1;
    padding: 0; display: none; transition: color 0.15s;
  }
  .search-clear:hover { color: var(--text); }
  .search-clear.visible { display: block; }

  /* Input */
  .input-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 16px; display: flex; align-items: center;
    gap: 10px; margin-bottom: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-card:focus-within { border-color: var(--border-hover); box-shadow: var(--shadow-lg); }

  .add-icon { width: 22px; height: 22px; flex-shrink: 0; color: var(--text-faint); }

  #todo-input {
    flex: 1; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    font-weight: 300; color: var(--text); outline: none;
  }
  #todo-input::placeholder { color: var(--text-faint); }

  /* Priority selector in input */
  .priority-select {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    padding: 5px 8px; outline: none; cursor: pointer;
    transition: border-color 0.15s;
  }
  .priority-select:focus { border-color: var(--border-hover); }

  .add-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 7px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  /* Tag input row */
  .tag-input-row {
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px 12px; flex-wrap: wrap;
  }
  .tag-input-label { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
  #new-tag-input {
    border: none; background: transparent; outline: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    color: var(--text); font-weight: 300; min-width: 80px; flex: 1;
  }
  #new-tag-input::placeholder { color: var(--text-faint); }

  .pending-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .pending-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent-light); color: var(--accent-text);
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
  }
  .pending-tag button { background: none; border: none; cursor: pointer; color: var(--accent-text); font-size: 13px; line-height: 1; padding: 0; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 8px; flex-wrap: wrap; }
  .filters { display: flex; gap: 4px; }
  .filter-btn {
    background: transparent; border: 1px solid transparent;
    border-radius: 999px; padding: 5px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { background: var(--surface); border-color: var(--border-hover); color: var(--text); box-shadow: var(--shadow); font-weight: 500; }

  /* Active tag filter chips */
  .active-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .active-tag-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent-light); color: var(--accent-text);
    font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 999px;
    cursor: pointer; border: 1px solid var(--accent);
  }
  .active-tag-chip:hover { opacity: 0.8; }

  /* Section labels */
  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-faint);
    padding: 0 4px; margin-bottom: 8px; margin-top: 1.5rem;
  }

  /* Todo list */
  .todo-list { display: flex; flex-direction: column; gap: 6px; }

  .todo-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s;
    animation: slideIn 0.2s ease both;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)} }
  .todo-item:hover { border-color: var(--border-hover); box-shadow: var(--shadow-lg); }
  .todo-item.done { opacity: 0.55; }
  .todo-item.pinned { border-color: rgba(45,90,61,0.3); }

  .todo-main { padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }

  .check-btn {
    width: 22px; height: 22px; border-radius: 50%; margin-top: 1px;
    border: 1.5px solid var(--border-hover); background: transparent;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .check-btn:hover { border-color: var(--accent); background: var(--accent-light); }
  .check-btn.checked { background: var(--accent); border-color: var(--accent); }
  .check-btn svg { display: none; }
  .check-btn.checked svg { display: block; }

  .todo-body { flex: 1; min-width: 0; }

  .todo-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }

  /* Priority dot */
  .p-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .p-dot.high { background: var(--p-high); }
  .p-dot.medium { background: var(--p-med); }
  .p-dot.low { background: var(--p-low); }

  /* Pin icon */
  .pin-indicator {
    font-size: 10px; color: var(--accent); opacity: 0.7;
  }

  .todo-text { font-size: 14.5px; line-height: 1.4; color: var(--text); }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-faint); }

  .todo-meta { font-size: 11.5px; color: var(--text-faint); margin-top: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  /* Tag chips on tasks */
  .tag-chip {
    display: inline-flex; align-items: center;
    background: var(--surface2); color: var(--text-muted);
    font-size: 11px; padding: 1px 7px; border-radius: 999px;
    cursor: pointer; transition: background 0.15s;
    border: 1px solid var(--border);
  }
  .tag-chip:hover { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }

  .note-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; color: var(--accent-text);
    background: var(--accent-light); padding: 1px 7px; border-radius: 999px;
  }

  .todo-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; margin-top: 1px; }
  .todo-item:hover .todo-actions { opacity: 1; }

  .action-btn {
    width: 28px; height: 28px; border: none; background: transparent;
    border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-faint); transition: all 0.15s; font-size: 13px;
  }
  .action-btn.pin-btn:hover { background: var(--accent-light); color: var(--accent); }
  .action-btn.pin-btn.active { color: var(--accent); }
  .action-btn.note-btn:hover { background: var(--accent-light); color: var(--accent); }
  .action-btn.note-btn.active { color: var(--accent); }
  .action-btn.del-btn:hover { background: var(--danger-light); color: var(--danger); }

  /* Priority badge on task */
  .p-badge {
    font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .p-badge.high { background: var(--p-high-bg); color: var(--p-high); }
  .p-badge.medium { background: var(--p-med-bg); color: var(--p-med); }
  .p-badge.low { background: var(--p-low-bg); color: var(--p-low); }

  /* Note panel */
  .note-panel { border-top: 1px solid var(--border); background: var(--note-bg); padding: 12px 16px 14px; display: none; }
  .note-panel.open { display: block; }
  .note-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }

  .note-textarea {
    width: 100%; min-height: 80px; max-height: 300px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13.5px;
    font-weight: 300; line-height: 1.6; padding: 10px 12px;
    resize: vertical; outline: none; transition: border-color 0.2s;
  }
  .note-textarea:focus { border-color: var(--border-hover); }
  .note-textarea::placeholder { color: var(--text-faint); }

  .note-view { font-size: 13.5px; font-weight: 300; line-height: 1.7; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }
  .note-view a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }

  .note-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
  .btn-save {
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 5px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-edit {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 5px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer;
  }
  .btn-edit:hover { border-color: var(--border-hover); color: var(--text); }

  /* Empty */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-faint); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; }
  .empty p { font-size: 14px; font-weight: 300; }

  /* Footer */
  .footer {
    margin-top: 1.5rem; display: flex; justify-content: space-between;
    align-items: center; padding-top: 1rem; border-top: 1px solid var(--border);
  }
  .footer-count { font-size: 13px; color: var(--text-muted); font-weight: 300; }
  .clear-btn {
    font-size: 13px; color: var(--text-faint); background: none; border: none;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    padding: 4px 10px; border-radius: var(--radius-sm); transition: all 0.15s;
  }
  .clear-btn:hover { background: var(--danger-light); color: var(--danger); }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 100; transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { font-size: 13px; color: var(--text-faint); font-weight: 300; }

  /* Search highlight */
  mark { background: rgba(45,90,61,0.15); color: inherit; border-radius: 2px; padding: 0 1px; }

  @media (max-width: 480px) {
    body { padding: 2rem 1rem 4rem; }
    .title-block h1 { font-size: 2.2rem; }
    .todo-actions { opacity: 1; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading your tasks…</p>
</div>

<div class="page">
  <header class="header">
    <div class="header-top">
      <div class="title-block">
        <h1>My <em>Tasks</em></h1>
        <div class="date-line" id="date-line"></div>
      </div>
      <div class="header-right">
        <div class="stats-pill">
          <span class="stats-dot"></span>
          <span id="stats-text">0 remaining</span>
        </div>
        <div class="sync-status">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-label">loading…</span>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0%</div>
    </div>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search tasks and notes…" oninput="onSearch()" autocomplete="off" />
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>

  <!-- Add task -->
  <div class="input-card" style="flex-direction: column; align-items: stretch; gap: 0; padding: 0;">
    <div style="display:flex; align-items:center; gap:10px; padding: 14px 16px 10px;">
      <svg class="add-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <input type="text" id="todo-input" placeholder="Add a new task…" maxlength="200" autocomplete="off" />
      <select class="priority-select" id="new-priority">
        <option value="">— priority</option>
        <option value="high">🔴 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <div class="tag-input-row">
      <span class="tag-input-label">Tags:</span>
      <div class="pending-tags" id="pending-tags"></div>
      <input type="text" id="new-tag-input" placeholder="add tag, press Enter…" maxlength="30" />
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
    </div>
  </div>

  <!-- Active tag filters -->
  <div class="active-tags" id="active-tags"></div>

  <div id="list-wrap"></div>

  <div class="footer" id="footer" style="display:none;">
    <span class="footer-count" id="footer-count"></span>
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>
</div>

<script>
  let todos = [];
  let filter = 'all';
  let nextId = 1;
  let openNotes = {};
  let editingNotes = {};
  let saveTimer = null;
  let searchQuery = '';
  let pendingTags = [];
  let activeTagFilters = [];

  document.getElementById('date-line').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });

  document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
  document.getElementById('new-tag-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,/g,'').toLowerCase();
      if (val && !pendingTags.includes(val)) { pendingTags.push(val); renderPendingTags(); }
      e.target.value = '';
    }
  });

  // ── Sync ──────────────────────────────────────────────────
  function setSyncStatus(state, label) {
    document.getElementById('sync-dot').className = 'sync-dot ' + state;
    document.getElementById('sync-label').textContent = label;
  }

  async function loadFromCloud() {
    try {
      setSyncStatus('syncing', 'loading…');
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error();
      const data = await res.json();
      todos = data.tasks || [];
      nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;
      setSyncStatus('synced', 'synced');
    } catch {
      setSyncStatus('error', 'offline — saved locally');
      try { todos = JSON.parse(localStorage.getItem('tasks_backup') || '[]'); } catch {}
      nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;
    }
    document.getElementById('loading-overlay').classList.add('hidden');
    render();
  }

  async function saveToCloud() {
    localStorage.setItem('tasks_backup', JSON.stringify(todos));
    setSyncStatus('syncing', 'saving…');
    try {
      const res = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tasks: todos })
      });
      if (!res.ok) throw new Error();
      setSyncStatus('synced', 'synced');
    } catch {
      setSyncStatus('error', 'sync failed — saved locally');
    }
  }

  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveToCloud, 800);
  }

  // ── Search ────────────────────────────────────────────────
  function onSearch() {
    searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
    const clearBtn = document.getElementById('search-clear');
    clearBtn.classList.toggle('visible', searchQuery.length > 0);
    render();
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    searchQuery = '';
    document.getElementById('search-clear').classList.remove('visible');
    render();
  }

  function matchesSearch(t) {
    if (!searchQuery) return true;
    return t.text.toLowerCase().includes(searchQuery) ||
           (t.note && t.note.toLowerCase().includes(searchQuery)) ||
           (t.tags && t.tags.some(tag => tag.toLowerCase().includes(searchQuery)));
  }

  function highlight(text) {
    if (!searchQuery) return esc(text);
    const escaped = esc(text);
    const q = esc(searchQuery);
    return escaped.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
  }

  // ── Tags ──────────────────────────────────────────────────
  function renderPendingTags() {
    document.getElementById('pending-tags').innerHTML = pendingTags.map(t =>
      `<span class="pending-tag">${esc(t)}<button onclick="removePendingTag('${esc(t)}')">×</button></span>`
    ).join('');
  }

  function removePendingTag(tag) {
    pendingTags = pendingTags.filter(t => t !== tag);
    renderPendingTags();
  }

  function toggleTagFilter(tag) {
    if (activeTagFilters.includes(tag)) {
      activeTagFilters = activeTagFilters.filter(t => t !== tag);
    } else {
      activeTagFilters.push(tag);
    }
    render();
  }

  function matchesTags(t) {
    if (!activeTagFilters.length) return true;
    return activeTagFilters.every(f => t.tags && t.tags.includes(f));
  }

  // ── Task operations ───────────────────────────────────────
  function addTodo() {
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if (!text) return input.focus();
    const priority = document.getElementById('new-priority').value;
    const tagInput = document.getElementById('new-tag-input').value.trim().toLowerCase();
    if (tagInput && !pendingTags.includes(tagInput)) pendingTags.push(tagInput);
    document.getElementById('new-tag-input').value = '';

    todos.unshift({
      id: nextId++, text, done: false, note: '',
      created: Date.now(), priority: priority || null,
      tags: [...pendingTags], pinned: false
    });

    input.value = '';
    document.getElementById('new-priority').value = '';
    pendingTags = [];
    renderPendingTags();
    scheduleSave();
    render();
    input.focus();
  }

  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; t.completedAt = t.done ? Date.now() : null; }
    scheduleSave(); render();
  }

  function togglePin(id) {
    const t = todos.find(t => t.id === id);
    if (t) t.pinned = !t.pinned;
    scheduleSave(); render();
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    delete openNotes[id]; delete editingNotes[id];
    scheduleSave(); render();
  }

  function clearDone() {
    todos.filter(t => t.done).forEach(t => { delete openNotes[t.id]; delete editingNotes[t.id]; });
    todos = todos.filter(t => !t.done);
    scheduleSave(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Notes ─────────────────────────────────────────────────
  function toggleNote(id) {
    openNotes[id] = !openNotes[id];
    if (!openNotes[id]) delete editingNotes[id];
    else { const t = todos.find(t => t.id === id); if (t && !t.note) editingNotes[id] = true; }
    render();
    if (editingNotes[id]) focusTa(id);
  }

  function editNote(id) { editingNotes[id] = true; render(); focusTa(id); }

  function focusTa(id) {
    setTimeout(() => {
      const ta = document.getElementById('nta-' + id);
      if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
    }, 30);
  }

  function saveNote(id) {
    const ta = document.getElementById('nta-' + id);
    const t = todos.find(t => t.id === id);
    if (t && ta) t.note = ta.value.trim();
    delete editingNotes[id];
    scheduleSave(); render();
  }

  function noteKey(e, id) { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveNote(id); }

  // ── Helpers ───────────────────────────────────────────────
  function linkify(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const d = Math.floor((Date.now() - ts) / 1000);
    if (d < 60) return 'just now';
    if (d < 3600) return Math.floor(d/60) + 'm ago';
    if (d < 86400) return Math.floor(d/3600) + 'h ago';
    return Math.floor(d/86400) + 'd ago';
  }

  // ── Render ────────────────────────────────────────────────
  function itemHtml(t) {
    const isOpen = !!openNotes[t.id];
    const isEditing = !!editingNotes[t.id];
    const hasNote = !!t.note;
    const priority = t.priority || null;
    const tags = t.tags || [];
    const pinned = !!t.pinned;

    const meta = t.done
      ? (t.completedAt ? 'Completed ' + timeAgo(t.completedAt) : 'Completed')
      : (t.created ? 'Added ' + timeAgo(t.created) : '');

    const pBadge = priority
      ? `<span class="p-badge ${priority}">${priority}</span>` : '';

    const tagChips = tags.map(tag =>
      `<span class="tag-chip" onclick="toggleTagFilter('${esc(tag)}')">#${esc(tag)}</span>`
    ).join('');

    const noteBadge = hasNote
      ? `<span class="note-badge">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>note</span>` : '';

    const pinIcon = pinned ? `<span class="pin-indicator">📌</span>` : '';

    let notePanel = '';
    if (isOpen) {
      notePanel = isEditing
        ? `<div class="note-panel open">
            <div class="note-label">Note</div>
            <textarea id="nta-${t.id}" class="note-textarea" placeholder="Add details, links, context…" onkeydown="noteKey(event,${t.id})">${esc(t.note||'')}</textarea>
            <div class="note-footer"><button class="btn-save" onclick="saveNote(${t.id})">Save &nbsp;⌘↵</button></div>
           </div>`
        : `<div class="note-panel open">
            <div class="note-label">Note</div>
            <div class="note-view">${linkify(t.note)}</div>
            <div class="note-footer"><button class="btn-edit" onclick="editNote(${t.id})">Edit</button></div>
           </div>`;
    }

    return `
      <div class="todo-item${t.done?' done':''}${pinned?' pinned':''}">
        <div class="todo-main">
          <button class="check-btn${t.done?' checked':''}" onclick="toggle(${t.id})">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,5.5 4.5,8.5 9.5,2.5"/>
            </svg>
          </button>
          <div class="todo-body">
            <div class="todo-top">
              ${pinIcon}
              ${pBadge}
              <span class="todo-text">${highlight(t.text)}</span>
            </div>
            <div class="todo-meta">
              ${meta ? `<span>${meta}</span>` : ''}
              ${tagChips}
              ${noteBadge}
            </div>
          </div>
          <div class="todo-actions">
            <button class="action-btn pin-btn${pinned?' active':''}" onclick="togglePin(${t.id})" title="${pinned?'Unpin':'Pin'}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="${pinned?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </button>
            <button class="action-btn note-btn${isOpen?' active':''}" onclick="toggleNote(${t.id})" title="Note">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
            </button>
            <button class="action-btn del-btn" onclick="remove(${t.id})" title="Delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3,6 5,6 21,6"/>
                <path d="M19,6l-1,14H6L5,6"/>
                <path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>
        ${notePanel}
      </div>`;
  }

  function render() {
    const wrap = document.getElementById('list-wrap');
    const footer = document.getElementById('footer');
    const active = todos.filter(t => !t.done);
    const done = todos.filter(t => t.done);
    const total = todos.length;
    const pct = total === 0 ? 0 : Math.round((done.length / total) * 100);

    document.getElementById('stats-text').textContent = active.length + ' remaining';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = pct + '%';
    document.getElementById('footer-count').textContent = active.length + ' task' + (active.length !== 1 ? 's' : '') + ' left';
    footer.style.display = total > 0 ? 'flex' : 'none';
    document.querySelector('.clear-btn').style.visibility = done.length ? 'visible' : 'hidden';

    // Render active tag filter chips
    const atEl = document.getElementById('active-tags');
    atEl.innerHTML = activeTagFilters.map(tag =>
      `<span class="active-tag-chip" onclick="toggleTagFilter('${esc(tag)}')">
        #${esc(tag)} <span style="opacity:0.6">×</span>
       </span>`
    ).join('');

    // Apply filters
    let visible = todos;
    if (filter === 'active') visible = active;
    if (filter === 'done') visible = done;

    // Apply search + tag filters
    visible = visible.filter(t => matchesSearch(t) && matchesTags(t));

    // Sort: pinned first (within active), then by created
    const pinnedItems = visible.filter(t => t.pinned && !t.done);
    const activeItems = visible.filter(t => !t.done && !t.pinned);
    const doneItems   = visible.filter(t => t.done);

    if (!visible.length) {
      const isFiltered = searchQuery || activeTagFilters.length;
      wrap.innerHTML = `<div class="empty">
        <span class="empty-icon">${isFiltered ? '🔍' : '✦'}</span>
        <p>${isFiltered ? 'No tasks match your search.' : filter === 'done' ? 'Nothing completed yet.' : filter === 'active' ? 'All caught up!' : 'Nothing here yet. Add your first task above.'}</p>
      </div>`;
      return;
    }

    let html = '';

    if (pinnedItems.length) {
      html += `<div class="section-label">Pinned</div>`;
      html += `<div class="todo-list">` + pinnedItems.map(itemHtml).join('') + `</div>`;
    }

    if (activeItems.length) {
      if (pinnedItems.length || (filter === 'all' && doneItems.length)) html += `<div class="section-label">Active</div>`;
      html += `<div class="todo-list">` + activeItems.map(itemHtml).join('') + `</div>`;
    }

    if (doneItems.length) {
      if (filter === 'all' && (activeItems.length || pinnedItems.length)) html += `<div class="section-label">Completed</div>`;
      html += `<div class="todo-list">` + doneItems.map(itemHtml).join('') + `</div>`;
    }

    wrap.innerHTML = html;
  }

  loadFromCloud();
</script>
</body>
</html>
