<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: rgba(0,0,0,0.09);
    --border-hover: rgba(0,0,0,0.18);
    --text: #1A1814;
    --text-muted: #8A8479;
    --text-faint: #B8B4AC;
    --accent: #2D5A3D;
    --accent-light: #EAF2EC;
    --accent-text: #1D3D28;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141210;
      --surface: #1E1C18;
      --surface2: #252320;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text: #EDE9E0;
      --text-muted: #7A7670;
      --text-faint: #4A4740;
      --accent: #4A8C60;
      --accent-light: #1A2E20;
      --accent-text: #7DC495;
      --danger: #E05A4A;
      --danger-light: #2A1510;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
    }
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1rem 6rem;
    transition: background 0.3s, color 0.3s;
  }

  .page {
    width: 100%;
    max-width: 580px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    margin-bottom: 2.5rem;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .title-block h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 2.8rem;
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .title-block h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .date-line {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.01em;
  }

  .stats-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent-text);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .stats-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Progress bar */
  .progress-wrap {
    margin-top: 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-faint);
    min-width: 40px;
    text-align: right;
  }

  /* Input area */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-card:focus-within {
    border-color: var(--border-hover);
    box-shadow: var(--shadow-lg);
  }

  .input-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    color: var(--text-faint);
  }

  #todo-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--text);
    outline: none;
  }

  #todo-input::placeholder { color: var(--text-faint); }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  /* Filters */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .filters {
    display: flex;
    gap: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 5px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); }

  .filter-btn.active {
    background: var(--surface);
    border-color: var(--border-hover);
    color: var(--text);
    box-shadow: var(--shadow);
    font-weight: 500;
  }

  .sort-select {
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
    appearance: none;
    padding-right: 4px;
  }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 0 4px;
    margin-bottom: 8px;
    margin-top: 1.5rem;
  }

  .section-label:first-of-type { margin-top: 0; }

  /* Todo list */
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .todo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, box-shadow 0.15s, opacity 0.3s;
    box-shadow: var(--shadow);
    animation: slideIn 0.2s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .todo-item:hover { border-color: var(--border-hover); box-shadow: var(--shadow-lg); }
  .todo-item.done { opacity: 0.6; }

  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }

  .check-btn:hover { border-color: var(--accent); background: var(--accent-light); }

  .check-btn.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-btn svg { display: none; }
  .check-btn.checked svg { display: block; }

  .todo-body { flex: 1; min-width: 0; }

  .todo-text {
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text);
    transition: color 0.2s;
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--text-faint);
  }

  .todo-meta {
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top: 3px;
  }

  .todo-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .todo-item:hover .todo-actions { opacity: 1; }

  .action-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    transition: all 0.15s;
  }

  .action-btn:hover { background: var(--danger-light); color: var(--danger); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-faint);
  }

  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    display: block;
  }

  .empty p { font-size: 14px; font-weight: 300; }

  /* Footer */
  .footer {
    margin-top: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .footer-count {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .clear-btn {
    font-size: 13px;
    color: var(--text-faint);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }

  .clear-btn:hover { background: var(--danger-light); color: var(--danger); }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 2rem 1rem 4rem; }
    .title-block h1 { font-size: 2.2rem; }
    .todo-actions { opacity: 1; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-top">
      <div class="title-block">
        <h1>My <em>Tasks</em></h1>
        <div class="date-line" id="date-line"></div>
      </div>
      <div class="stats-pill" id="stats-pill">
        <span class="stats-dot"></span>
        <span id="stats-text">0 remaining</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label" id="progress-label">0%</div>
    </div>
  </header>

  <div class="input-card">
    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    <input type="text" id="todo-input" placeholder="Add a new task…" maxlength="200" autocomplete="off" />
    <button class="add-btn" onclick="addTodo()">Add</button>
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Done</button>
    </div>
  </div>

  <div id="list-wrap"></div>

  <div class="footer" id="footer" style="display:none;">
    <span class="footer-count" id="footer-count"></span>
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>

</div>

<script>
  const STORAGE_KEY = 'kabir_todos_v1';
  let todos = load();
  let filter = 'all';
  let nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  // Date
  const dateEl = document.getElementById('date-line');
  dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  // Input
  document.getElementById('todo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  function addTodo() {
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    todos.unshift({ id: nextId++, text, done: false, created: Date.now() });
    input.value = '';
    save();
    render();
    input.focus();
  }

  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; t.completedAt = t.done ? Date.now() : null; }
    save();
    render();
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    todos = todos.filter(t => !t.done);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const wrap = document.getElementById('list-wrap');
    const footer = document.getElementById('footer');
    const statsText = document.getElementById('stats-text');
    const footerCount = document.getElementById('footer-count');
    const progressFill = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');

    const active = todos.filter(t => !t.done);
    const done = todos.filter(t => t.done);
    const total = todos.length;
    const pct = total === 0 ? 0 : Math.round((done.length / total) * 100);

    statsText.textContent = active.length + ' remaining';
    progressFill.style.width = pct + '%';
    progressLabel.textContent = pct + '%';
    footerCount.textContent = active.length + ' task' + (active.length !== 1 ? 's' : '') + ' left';

    let visible = todos;
    if (filter === 'active') visible = active;
    if (filter === 'done') visible = done;

    footer.style.display = total > 0 ? 'flex' : 'none';
    document.querySelector('.clear-btn').style.visibility = done.length ? 'visible' : 'hidden';

    if (visible.length === 0) {
      const msgs = {
        all: { icon: '✦', text: 'Nothing here yet. Add your first task above.' },
        active: { icon: '✓', text: 'All caught up! No active tasks.' },
        done: { icon: '○', text: 'Nothing completed yet.' }
      };
      const m = msgs[filter];
      wrap.innerHTML = `<div class="empty"><span class="empty-icon">${m.icon}</span><p>${m.text}</p></div>`;
      return;
    }

    // Separate active/done for display
    const activeItems = visible.filter(t => !t.done);
    const doneItems = visible.filter(t => t.done);

    let html = '';

    if (activeItems.length) {
      if (filter === 'all' && doneItems.length) html += `<div class="section-label">Active</div>`;
      html += `<div class="todo-list">` + activeItems.map(t => itemHtml(t)).join('') + `</div>`;
    }

    if (doneItems.length) {
      if (filter === 'all' && activeItems.length) html += `<div class="section-label">Completed</div>`;
      html += `<div class="todo-list">` + doneItems.map(t => itemHtml(t)).join('') + `</div>`;
    }

    wrap.innerHTML = html;
  }

  function itemHtml(t) {
    const meta = t.done
      ? (t.completedAt ? 'Completed ' + timeAgo(t.completedAt) : 'Completed')
      : (t.created ? 'Added ' + timeAgo(t.created) : '');

    return `
      <div class="todo-item${t.done ? ' done' : ''}">
        <button class="check-btn${t.done ? ' checked' : ''}" onclick="toggle(${t.id})" title="${t.done ? 'Mark incomplete' : 'Mark complete'}">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1.5,5.5 4.5,8.5 9.5,2.5"/>
          </svg>
        </button>
        <div class="todo-body">
          <div class="todo-text">${esc(t.text)}</div>
          ${meta ? `<div class="todo-meta">${meta}</div>` : ''}
        </div>
        <div class="todo-actions">
          <button class="action-btn" onclick="remove(${t.id})" title="Delete task">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/>
            </svg>
          </button>
        </div>
      </div>`;
  }

  render();
</script>
</body>
</html>
